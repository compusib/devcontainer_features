name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - color
          - hello
          - bashrc
          - argbash
          - claude
        baseImage:
          - debian:latest
          - ubuntu:latest
          - mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - color
          - hello
          - bashrc
          - argbash
          - git-hooks
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .

  # 'claude' is split out of the shared matrix because some of its scenarios are tagged 'remote':
  # they clone the settings-bridge vsix from GitHub over git-SSH, which needs a github.com SSH
  # identity the CI build container does not have. Run only the hermetic scenarios here; the
  # 'remote'-tagged ones (e.g. settings_bridge_remote) are validated locally where SSH-agent
  # forwarding is available. --filter is include-only, so this allowlists the CI-safe scenarios.
  test-scenarios-claude:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing 'claude' hermetic scenarios (excludes remote-tagged)"
        run: |
          set -e
          for scenario in \
            marketplace_online \
            marketplace_mounted \
            settings_bridge_disabled \
            settings_bridge_local; do
            devcontainer features test -f claude --skip-autogenerated --skip-duplicated --filter "$scenario" .
          done

  test-global:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
